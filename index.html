<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelGram</title>
  <link rel="stylesheet" href="./styles/index.css">

  <link href="https://fonts.googleapis.com/css2?family=Alice&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:wght@400;700&display=swap" rel="stylesheet">

</head>
<body>
  <div class="bg-surface-color">
    <nav class="container">
      <a href="#" id="logo">
        <img src="./assets/Logo.svg" alt="TravelGram Logo">
      </a>
      <ul id="primary-menu">
        <li><a href="#">
          <img src="./assets/icons/MagnifyingGlass.svg" alt="Search Icon">
        </a></li>
        <li><a href="#">Explore</a></li>
        <li><a href="#">My trips</a></li>
        <li><a href="#">
          <img src="./assets/profile.png" alt="User Icon">
        </a></li>
      </ul>
    </nav>

    <header>
      <div class="container">
        <div id="profile">
          <img src="./assets/profile.png" alt="User Profile Picture">
          <div>
            <h1>Isabela Torres</h1>
            <p>A lover of travel, culture, and gastronomy. 🌍✈️<br>
              Here, I share stories captured in every snapshot, exploring fascinating corners of our planet from the bustling city of São Paulo. 🏙️📸</p>
          </div>
        </div>
        <ul id="info">
          <li>
            <img src="./assets/icons/MapPin.svg" alt="Map Pin Icon">
            <span>São Paulo, Brazil</span>
          </li>
          <li>
            <img src="./assets/icons/AirplaneTilt.svg" alt="Airplane Tilt Icon">
            <span>37 países</span>
          </li>
          <li>
            <img src="./assets/icons/Image.svg" alt="Picture Icon">
            <span>240 fotos</span>
          </li>
        </ul>
      </div>
    </header>
  </div>

</body>
</html>
